name: Build Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 🏗 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 Build Android AAB
        run: eas build --platform android --profile production --local --non-interactive --output build/aether.aab

      - name: 📤 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether-android-build
          path: build/aether.aab

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/aether.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
