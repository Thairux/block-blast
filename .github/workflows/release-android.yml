name: Build & Release Android APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🛠 Prebuild Android
        run: npx expo prebuild --platform android --no-install

      - name: 🚀 Build Android APK (Universal)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..
          mkdir -p build
          cp android/app/build/outputs/apk/release/app-release.apk build/aether-universal.apk

      - name: 📝 Generate Release Notes & Tutorial
        run: |
          cat <<EOF > release_notes.md
          ## 🌌 Aether v$(node -p "require('./app.json').expo.version")

          ### 📦 Download & Install Guide
          To install Aether on your Android device:
          1. **Download:** Click on the \`aether-universal.apk\` asset below.
          2. **Open:** Once downloaded, tap the file in your notification bar or downloads folder.
          3. **Permissions:** If prompted, allow "Install from Unknown Sources" in your browser/file manager settings.
          4. **Install:** Follow the system prompts to complete the installation.
          5. **Play:** Find the celestial 'A' icon in your app drawer and enjoy!

          ### ✨ What's New
          - Optimized performance and mobile web layout.
          - Indestructible Survival Engine for Infinite mode.
          - Strategic IQ rating logic (beat the loop).
          - Professional celestial branding.
          EOF

      - name: 🏷️ Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          files: build/aether-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
