name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main

jobs:
  flutter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: block_blast_app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: dart analyze lib/src/app.dart test/widget_test.dart

      - name: Test
        run: flutter test test/widget_test.dart --reporter expanded

      - name: Build web
        run: flutter build web
